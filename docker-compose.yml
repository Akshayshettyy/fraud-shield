version: "3.9"

services:
  fraud-shield-api:
    build: .
    container_name: fraud-shield-api
    ports:
      - "8000:8000"
    environment:
      - ARTIFACTS_DIR=models/
    volumes:
      - ./notebooks/models:/app/models  # mount models so no rebuild needed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
