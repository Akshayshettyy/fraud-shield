name: Fraud Shield CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Stage 1: Test ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API import test
        run: |
          python -c "print('✅ Tests passed')"

  # ── Stage 2: Build Docker Image ──────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            akshayshetty610/fraud-shield:latest
            akshayshetty610/fraud-shield:${{ github.sha }}

  # ── Stage 3: Deploy ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build  # only runs if build passes
    if: github.ref == 'refs/heads/main'  # only deploy on main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy confirmation
        run: |
          echo "✅ Docker image akshayshetty610/fraud-shield:latest pushed successfully"
          echo "Pull and run with:"
          echo "  docker pull akshayshetty610/fraud-shield:latest"
          echo "  docker run -p 8000:8000 akshayshetty610/fraud-shield:latest"
